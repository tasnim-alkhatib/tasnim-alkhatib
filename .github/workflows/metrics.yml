name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tasnim-alkhatib
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Cairo
          
          # تفعيل لغات البرمجة (الدوائر الملونة)
          plugin_languages: yes
          plugin_languages_details: percentage
          
          # تفعيل الرسم البياني للأسطر (المنحنى)
          plugin_lines: yes
          
          # إعدادات الشكل (Theme)
          # ملاحظة: لو theme عمل مشكلة تانية، جربي تشيلي السطر ده وهيستخدم التلقائي
          config_display: columns
