name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tasnim-alkhatib
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Cairo
          
          # إظهار لغات البرمجة كدوائر (زي الصورة)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          
          # إظهار الرسم البياني (المنحنى)
          plugin_lines: yes
          
          # إظهار التوقعات والنشاط (بيخلي الشكل "مليان")
          plugin_followup: yes
          plugin_introduction: yes
          
          # التنسيق والألوان
          theme: tokyonight
          config_order: header, activity, community, repositories, languages, lines, metadata
