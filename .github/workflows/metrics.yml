name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # أهم خطوة: استخدام الإصدار v3.33 المستقر
      - uses: lowlighter/metrics@v3.33
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tasnim-alkhatib
          template: classic
          config_timezone: Africa/Cairo
          
          # إظهار لغات البرمجة كجرافيكس (الدوائر الملونة)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          
          # إظهار الرسم البياني (المنحنى الأخضر)
          plugin_lines: yes
          
          # الـ Theme (الألوان الزرقاء والخضراء)
          theme: tokyonight
          
          # ترتيب العناصر عشان تطلع "لوحة واحدة"
          config_order: header, activity, community, repositories, languages, lines, metadata
