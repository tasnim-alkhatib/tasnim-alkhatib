name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # بيحدث الصورة تلقائياً كل ساعة
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tasnim-alkhatib # اكتبي اسم المستخدم بتاعك هنا
          template: classic
          config_timezone: Africa/Cairo
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 10
          plugin_languages_details_bytes_size: bytes
          plugin_lines: yes
          config_order: header, activity, community, repositories, languages, lines, metadata
          plugin_followup: yes
          plugin_followup_indepth: yes
          theme: tokyonight # بيديكي الألوان الاحترافية اللي في الصورة
